<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>illumin8HR — Forecasting</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --brand:#1a3a5c;--brand-mid:#2458a0;--brand-light:#e8f0fb;--brand-hover:#132d47;
      --accent:#0ea472;--accent-light:#d1f5e8;--accent-dark:#0a7a54;
      --actuals:#1a3a5c;--forecast:#2458a0;--adjusted:#0ea472;
      --warn:#f59e0b;--warn-light:#fef3c7;--warn-text:#92400e;
      --danger:#dc2626;--danger-light:#fee2e2;
      --surface:#f0f4f8;--card:#fff;
      --border:rgba(26,58,92,0.09);--border-mid:rgba(26,58,92,0.16);--border-strong:rgba(26,58,92,0.24);
      --text:#0f1f35;--text2:#4a6080;--text3:#8099b8;
      --r-sm:5px;--r-md:8px;--r-lg:12px;--r-xl:16px;--r-full:9999px;
      --font:'DM Sans',system-ui,sans-serif;--mono:'DM Mono',monospace;
      --sh-sm:0 1px 3px rgba(26,58,92,0.07);--sh-md:0 4px 14px rgba(26,58,92,0.1);
      --list-w:280px;
    }
    body{font-family:var(--font);background:var(--surface);color:var(--text);height:100vh;overflow:hidden;font-size:13px;}

    /* ─── App shell ──────────────────────────────────────────────────────── */
    .shell{display:flex;height:100vh;overflow:hidden;}

    /* ─── App sidebar (nav) ──────────────────────────────────────────────── */
    .app-nav{width:52px;min-width:52px;background:var(--brand);display:flex;flex-direction:column;align-items:center;padding:14px 0;gap:4px;z-index:10;}
    .app-nav-logo{width:32px;height:32px;background:rgba(255,255,255,0.15);border-radius:9px;display:flex;align-items:center;justify-content:center;margin-bottom:16px;}
    .app-nav-logo svg{width:18px;height:18px;}
    .nav-ico{width:36px;height:36px;border-radius:var(--r-md);display:flex;align-items:center;justify-content:center;cursor:pointer;color:rgba(255,255,255,0.45);transition:all 0.15s;}
    .nav-ico:hover{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.8);}
    .nav-ico.active{background:rgba(255,255,255,0.15);color:#fff;}
    .nav-ico svg{width:17px;height:17px;}
    .nav-ico-bottom{margin-top:auto;}

    /* ─── Main area ──────────────────────────────────────────────────────── */
    .main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}

    /* ─── Top bar ────────────────────────────────────────────────────────── */
    .topbar{height:52px;background:var(--card);border-bottom:0.5px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0;box-shadow:var(--sh-sm);}
    .topbar-title{font-size:14px;font-weight:600;color:var(--text);}
    .topbar-crumb{font-size:12px;color:var(--text3);}
    .topbar-sep{color:var(--text3);font-size:12px;}
    .topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
    .tag{font-size:10px;font-weight:600;padding:2px 8px;border-radius:var(--r-full);letter-spacing:.03em;}
    .tag-mono{background:#f1f5f9;color:var(--text2);font-family:var(--mono);}
    .tag-green{background:var(--accent-light);color:var(--accent-dark);}

    /* ─── Buttons ────────────────────────────────────────────────────────── */
    .btn{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;font-size:12px;font-weight:500;border-radius:var(--r-md);cursor:pointer;border:none;transition:all 0.15s;font-family:var(--font);white-space:nowrap;}
    .btn-primary{background:var(--brand);color:#fff;}.btn-primary:hover{background:var(--brand-hover);}
    .btn-accent{background:var(--accent);color:#fff;}.btn-accent:hover{opacity:.88;}
    .btn-outline{background:transparent;color:var(--text2);border:0.5px solid var(--border-mid);}.btn-outline:hover{background:var(--surface);}
    .btn-ghost{background:transparent;color:var(--text2);border:none;}.btn-ghost:hover{background:var(--surface);}
    .btn-danger{background:var(--danger-light);color:var(--danger);border:0.5px solid rgba(220,38,38,.2);}.btn-danger:hover{background:#fecaca;}
    .btn-sm{padding:4px 10px;font-size:11px;}
    .btn-new{width:100%;justify-content:center;gap:7px;padding:9px;border-radius:var(--r-md);background:var(--brand);color:#fff;font-size:12px;font-weight:600;cursor:pointer;border:none;font-family:var(--font);transition:background .15s;letter-spacing:.01em;}
    .btn-new:hover{background:var(--brand-hover);}
    .btn-new svg{width:14px;height:14px;}

    /* ─── Three-column workspace ─────────────────────────────────────────── */
    .workspace{flex:1;display:flex;overflow:hidden;}

    /* ─── Forecast list panel ────────────────────────────────────────────── */
    .list-panel{width:var(--list-w);min-width:var(--list-w);background:var(--card);border-right:0.5px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
    .list-header{padding:14px 14px 10px;flex-shrink:0;}
    .list-search{position:relative;margin-bottom:10px;}
    .list-search input{width:100%;padding:7px 10px 7px 32px;font-size:12px;border:0.5px solid var(--border-mid);border-radius:var(--r-md);background:var(--surface);color:var(--text);font-family:var(--font);}
    .list-search input:focus{outline:none;border-color:var(--brand-mid);box-shadow:0 0 0 3px rgba(36,88,160,.08);}
    .list-search input::placeholder{color:var(--text3);}
    .list-search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none;}
    .list-search-icon svg{width:13px;height:13px;}

    .list-scroll{flex:1;overflow-y:auto;padding:0 8px 12px;}
    .list-group-label{font-size:9.5px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;padding:10px 6px 5px;display:flex;align-items:center;gap:6px;}
    .list-group-label svg{width:11px;height:11px;}

    .fc-item{display:flex;align-items:center;gap:0;padding:9px 10px;border-radius:var(--r-md);cursor:pointer;margin-bottom:2px;transition:all .15s;border:0.5px solid transparent;position:relative;}
    .fc-item:hover{background:var(--surface);}
    .fc-item.active{background:var(--brand-light);border-color:rgba(36,88,160,.2);}
    .fc-item-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-right:9px;margin-top:2px;}
    .fc-item-body{flex:1;min-width:0;}
    .fc-item-name{font-size:12.5px;font-weight:500;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:2px;}
    .fc-item.active .fc-item-name{color:var(--brand-mid);}
    .fc-item-meta{font-size:10.5px;color:var(--text3);display:flex;align-items:center;gap:5px;overflow:hidden;}
    .fc-item-meta span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .fc-item-badge{flex-shrink:0;font-size:9.5px;font-weight:600;padding:2px 7px;border-radius:var(--r-full);letter-spacing:.03em;}
    .badge-shared{background:#f0fdf4;color:#166534;border:0.5px solid #bbf7d0;}
    .badge-mine{background:var(--brand-light);color:var(--brand-mid);border:0.5px solid rgba(36,88,160,.2);}
    .badge-role{background:#faf5ff;color:#6b21a8;border:0.5px solid #e9d5ff;}
    .fc-item-actions{display:none;position:absolute;right:6px;top:50%;transform:translateY(-50%);gap:2px;}
    .fc-item:hover .fc-item-actions{display:flex;}
    .fc-item-action{width:22px;height:22px;border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;background:transparent;color:var(--text3);cursor:pointer;border:none;transition:all .15s;}
    .fc-item-action:hover{background:var(--border);color:var(--text2);}
    .fc-item-action svg{width:12px;height:12px;}

    /* ─── Detail panel ───────────────────────────────────────────────────── */
    .detail-panel{flex:1;display:flex;overflow:hidden;min-width:0;}

    /* ─── Empty state ────────────────────────────────────────────────────── */
    .empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:40px;}
    .empty-icon{width:56px;height:56px;background:var(--brand-light);border-radius:16px;display:flex;align-items:center;justify-content:center;}
    .empty-icon svg{width:28px;height:28px;color:var(--brand-mid);}
    .empty-title{font-size:15px;font-weight:600;color:var(--text);}
    .empty-sub{font-size:12.5px;color:var(--text3);text-align:center;max-width:320px;line-height:1.6;}

    /* ─── Forecast detail ────────────────────────────────────────────────── */
    .fc-detail{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
    .fc-detail-topbar{height:50px;background:var(--card);border-bottom:0.5px solid var(--border);display:flex;align-items:center;padding:0 18px;gap:10px;flex-shrink:0;}
    .fc-detail-name{font-size:13.5px;font-weight:600;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .fc-detail-content{flex:1;overflow-y:auto;display:flex;gap:0;min-height:0;}

    /* ─── Controls sidebar ───────────────────────────────────────────────── */
    .ctrl-panel{width:258px;min-width:258px;border-right:0.5px solid var(--border);padding:14px 12px;display:flex;flex-direction:column;gap:10px;overflow-y:auto;background:var(--surface);}
    .p-card{background:var(--card);border:0.5px solid var(--border);border-radius:var(--r-lg);padding:14px;box-shadow:var(--sh-sm);}
    .p-title{font-size:9.5px;font-weight:700;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:11px;}
    .p-hint{font-size:11px;color:var(--text2);line-height:1.6;margin-bottom:9px;}
    .field-label{display:block;font-size:11px;font-weight:500;color:var(--text2);margin-bottom:4px;}
    .fgroup{margin-bottom:10px;}.fgroup:last-child{margin-bottom:0;}
    select,input[type=number]{width:100%;padding:6px 9px;font-size:12px;border:0.5px solid var(--border-mid);border-radius:var(--r-sm);background:var(--surface);color:var(--text);font-family:var(--font);}
    select:focus,input[type=number]:focus{outline:none;border-color:var(--brand-mid);box-shadow:0 0 0 3px rgba(36,88,160,.08);}

    .toggle-row{display:flex;border:0.5px solid var(--border-mid);border-radius:var(--r-sm);overflow:hidden;}
    .tgl-btn{flex:1;padding:6px 4px;font-size:11px;font-weight:500;text-align:center;background:var(--surface);color:var(--text2);cursor:pointer;border:none;border-right:0.5px solid var(--border-mid);transition:all .15s;font-family:var(--font);}
    .tgl-btn:last-child{border-right:none;}
    .tgl-btn.active{background:var(--brand);color:#fff;}
    .tgl-btn:hover:not(.active){background:var(--brand-light);color:var(--brand-mid);}

    .chip-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:3px;}
    .chip{font-size:11px;padding:3px 9px;border-radius:var(--r-full);border:0.5px solid var(--border-mid);background:var(--surface);color:var(--text2);cursor:pointer;transition:all .15s;user-select:none;}
    .chip:hover{border-color:var(--brand-mid);color:var(--brand-mid);}
    .chip.active{background:var(--brand-light);color:var(--brand-mid);border-color:rgba(36,88,160,.3);font-weight:500;}

    .ci-row{display:flex;align-items:center;gap:8px;margin-top:5px;}
    .ci-val{font-size:11.5px;font-weight:600;min-width:32px;text-align:right;font-family:var(--mono);color:var(--brand-mid);}
    input[type=range]{flex:1;accent-color:var(--brand-mid);cursor:pointer;}

    .adj-scroll{max-height:190px;overflow-y:auto;margin-bottom:8px;}
    .adj-row{display:flex;align-items:center;gap:7px;margin-bottom:6px;}
    .adj-lbl{font-size:11px;color:var(--text2);width:46px;flex-shrink:0;font-family:var(--mono);}
    .adj-wrap{flex:1;position:relative;}
    .adj-inp{width:100%;padding:4px 22px 4px 7px;font-size:11.5px;text-align:right;}
    .adj-pm{position:absolute;right:6px;top:50%;transform:translateY(-50%);font-size:9.5px;color:var(--text3);pointer-events:none;}
    .adj-dot{width:6px;height:6px;border-radius:50%;background:var(--border-mid);flex-shrink:0;transition:background .2s;}
    .adj-dot.on{background:var(--accent);}
    .hr{height:0.5px;background:var(--border);margin:8px 0;}
    .adj-btns{display:flex;gap:7px;}
    .adj-btns .btn{flex:1;}

    .data-banner{display:flex;align-items:flex-start;gap:7px;border-radius:var(--r-md);padding:9px 11px;font-size:11px;line-height:1.55;}
    .data-ok{background:var(--accent-light);border:0.5px solid rgba(14,164,114,.3);color:var(--accent-dark);}
    .data-warn{background:var(--warn-light);border:0.5px solid rgba(245,158,11,.3);color:var(--warn-text);}
    .data-banner svg{flex-shrink:0;margin-top:1px;}

    /* ─── Chart area ─────────────────────────────────────────────────────── */
    .chart-area{flex:1;padding:16px 18px;display:flex;flex-direction:column;gap:12px;overflow-y:auto;min-width:0;}

    .kpi-row{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;}
    .kpi-card{background:var(--card);border:0.5px solid var(--border);border-radius:var(--r-lg);padding:12px 14px;box-shadow:var(--sh-sm);}
    .kpi-lbl{font-size:10px;color:var(--text3);margin-bottom:4px;font-weight:500;text-transform:uppercase;letter-spacing:.03em;}
    .kpi-val{font-size:20px;font-weight:600;margin-bottom:2px;}
    .kpi-d{font-size:10.5px;}
    .up{color:var(--accent);}.dn{color:var(--danger);}.neutral{color:var(--text3);}

    .chart-card{background:var(--card);border:0.5px solid var(--border);border-radius:var(--r-lg);padding:18px;box-shadow:var(--sh-sm);}
    .chart-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;}
    .chart-ttl{font-size:13.5px;font-weight:600;margin-bottom:2px;}
    .chart-sub-txt{font-size:11px;color:var(--text3);}
    .chart-head-r{display:flex;flex-direction:column;align-items:flex-end;gap:7px;}
    .badge-row{display:flex;gap:5px;}
    .badge{font-size:9.5px;font-weight:600;padding:2px 8px;border-radius:var(--r-full);letter-spacing:.03em;}
    .b-blue{background:var(--brand-light);color:var(--brand-mid);}
    .b-green{background:var(--accent-light);color:var(--accent-dark);}
    .b-amber{background:var(--warn-light);color:var(--warn-text);}
    .legend-row{display:flex;gap:12px;flex-wrap:wrap;justify-content:flex-end;}
    .leg-item{display:flex;align-items:center;gap:5px;font-size:10.5px;color:var(--text2);}
    .l-solid{display:inline-block;width:18px;height:2.5px;border-radius:2px;flex-shrink:0;}
    .l-dash{display:inline-block;width:18px;border-top:2.5px dashed;flex-shrink:0;}
    .l-dot{display:inline-block;width:18px;border-top:2.5px dotted;flex-shrink:0;}
    .l-ci{display:inline-block;width:18px;height:9px;border-radius:2px;background:rgba(36,88,160,.1);flex-shrink:0;}
    .chart-wrap{position:relative;width:100%;height:240px;}
    .chart-wrap canvas{width:100%!important;height:100%!important;}
    .chart-foot{display:flex;justify-content:space-between;margin-top:10px;padding-top:8px;border-top:0.5px solid var(--border);font-size:10px;color:var(--text3);}

    .insight-row{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;}
    .ins-card{background:var(--card);border:0.5px solid var(--border);border-radius:var(--r-md);padding:11px 13px;box-shadow:var(--sh-sm);}
    .ins-val{font-size:13.5px;font-weight:600;margin-bottom:3px;}
    .ins-txt{font-size:10.5px;color:var(--text2);line-height:1.55;}

    /* ─── Info pill ──────────────────────────────────────────────────────── */
    .info-pill{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:600;padding:3px 8px;border-radius:var(--r-full);background:#f1f5f9;color:var(--text2);cursor:pointer;border:0.5px solid var(--border-mid);transition:all .15s;}
    .info-pill:hover{background:var(--brand-light);color:var(--brand-mid);}

    /* ─── Modal ──────────────────────────────────────────────────────────── */
    .modal-bg{position:fixed;inset:0;background:rgba(15,31,53,.4);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity .2s;}
    .modal-bg.open{opacity:1;pointer-events:all;}
    .modal{background:var(--card);border-radius:var(--r-xl);padding:24px;width:460px;box-shadow:var(--sh-md);transform:translateY(10px);transition:transform .2s;}
    .modal-bg.open .modal{transform:translateY(0);}
    .modal-ttl{font-size:14px;font-weight:600;margin-bottom:5px;}
    .modal-sub{font-size:12px;color:var(--text2);margin-bottom:18px;line-height:1.6;}
    .modal-foot{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;}
    textarea{width:100%;padding:9px 11px;font-size:12px;font-family:var(--font);border:0.5px solid var(--border-mid);border-radius:var(--r-md);resize:vertical;min-height:80px;background:var(--surface);color:var(--text);}
    textarea:focus{outline:none;border-color:var(--brand-mid);}
    .modal-input{width:100%;padding:8px 10px;font-size:12.5px;border:0.5px solid var(--border-mid);border-radius:var(--r-md);font-family:var(--font);background:var(--surface);color:var(--text);}
    .modal-input:focus{outline:none;border-color:var(--brand-mid);}

    /* ─── Scrollbars ─────────────────────────────────────────────────────── */
    ::-webkit-scrollbar{width:4px;}
    ::-webkit-scrollbar-track{background:transparent;}
    ::-webkit-scrollbar-thumb{background:var(--border-mid);border-radius:3px;}

    /* ─── New forecast wizard panel ──────────────────────────────────────── */
    .wizard{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:40px 32px;overflow-y:auto;gap:0;background:var(--surface);}
    .wizard-card{background:var(--card);border:0.5px solid var(--border);border-radius:var(--r-xl);padding:28px 32px;width:100%;max-width:560px;box-shadow:var(--sh-md);}
    .wizard-title{font-size:17px;font-weight:600;margin-bottom:4px;}
    .wizard-sub{font-size:12px;color:var(--text2);margin-bottom:24px;line-height:1.6;}
    .wizard-field{margin-bottom:16px;}
    .wizard-field label{display:block;font-size:11px;font-weight:600;color:var(--text2);margin-bottom:5px;letter-spacing:.03em;text-transform:uppercase;}
    .wizard-field select,.wizard-field input{width:100%;padding:9px 11px;font-size:13px;border:0.5px solid var(--border-mid);border-radius:var(--r-md);background:var(--surface);color:var(--text);font-family:var(--font);}
    .wizard-field select:focus,.wizard-field input:focus{outline:none;border-color:var(--brand-mid);box-shadow:0 0 0 3px rgba(36,88,160,.08);}
    .wizard-note{font-size:11px;color:var(--text3);margin-top:6px;line-height:1.55;}
    .wizard-actions{display:flex;gap:10px;margin-top:24px;justify-content:flex-end;}
  </style>
</head>
<body>
<div class="shell">

  <!-- ── Icon nav ────────────────────────────────────────────────────────── -->
  <nav class="app-nav">
    <div class="app-nav-logo">
      <svg fill="none" stroke="white" stroke-width="2" viewBox="0 0 24 24"><path d="M3 13.5l5-5 4 4 5-6 4 4"/></svg>
    </div>
    <div class="nav-ico" title="Dashboards">
      <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    </div>
    <div class="nav-ico" title="Report Designer">
      <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M9 17H5a2 2 0 01-2-2V5a2 2 0 012-2h4m6 14h4a2 2 0 002-2V5a2 2 0 00-2-2h-4m-3 14V3"/></svg>
    </div>
    <div class="nav-ico" title="Insights">
      <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2v2m0 16v2M4.22 4.22l1.42 1.42m12.72 12.72l1.42 1.42M2 12h2m16 0h2"/></svg>
    </div>
    <div class="nav-ico active" title="Forecasts">
      <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M2.25 18L9 11.25l4.306 4.306a11.95 11.95 0 015.814-5.518l2.74-1.22m0 0l-5.94-2.281m5.94 2.28l-2.28 5.941"/></svg>
    </div>
    <div class="nav-ico" title="My Metrics">

function renderList(filter) {
  const scroll = document.getElementById('listScroll');
  const q = (filter||'').toLowerCase();

  let html = '';

  if (mine.length) {
    html += `<div class="list-group-label"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/></svg>My Forecasts</div>`;
    mine.forEach(f => { html += fcItemHTML(f); });
  }

  if (shared.length) {
    html += `<div class="list-group-label" style="margin-top:8px;"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 18.72a9.094 9.094 0 003.741-.479 3 3 0 00-4.682-2.72m.94 3.198l.001.031c0 .225-.012.447-.037.666A11.944 11.944 0 0112 21c-2.17 0-4.207-.576-5.963-1.584A6.062 6.062 0 016 18.719m12 0a5.971 5.971 0 00-.941-3.197m0 0A5.995 5.995 0 0012 12.75a5.995 5.995 0 00-5.058 2.772m0 0a3 3 0 00-4.681 2.72 8.986 8.986 0 003.74.477m.94-3.197a5.971 5.971 0 00-.94 3.197M15 6.75a3 3 0 11-6 0 3 3 0 016 0zm6 3a2.25 2.25 0 11-4.5 0 2.25 2.25 0 014.5 0zm-13.5 0a2.25 2.25 0 11-4.5 0 2.25 2.25 0 014.5 0z"/></svg>Shared with me</div>`;
    shared.forEach(f => { html += fcItemHTML(f); });
  }

  if (!mine.length && !shared.length) {
    html = `<div style="padding:24px 12px;text-align:center;font-size:12px;color:var(--text3);">No forecasts match your search.</div>`;
  }

  scroll.innerHTML = html;
}

function fcItemHTML(f) {
  const age = f.updatedDays === 0 ? 'Today' : f.updatedDays === 1 ? 'Yesterday' : f.updatedDays + 'd ago';

    ? `<span class="fc-item-badge badge-role">Role</span>`
    : `<span class="fc-item-badge badge-shared">Shared</span>`;
  const isQ = f.agg === 'quarterly';
  const metaStr = `${isQ ? f.horizon+'Q' : f.horizon+'M'} · ${isQ ? 'Quarterly' : 'Monthly'} · ${age}`;
  return `
  <div class="fc-item${f.id===activeId?' active':''}" id="fcitem_${f.id}" onclick="selectFc(${f.id})">
    <div class="fc-item-dot" style="background:${f.dotColor};"></div>

      <div class="fc-item-name">${f.name}</div>
      <div class="fc-item-meta">
        <span>${f.owner !== 'me' ? f.owner + ' · ' : ''}${metaStr}</span>

    </div>
  </div>`;
}

function filterList(q) { renderList(q); }

  renderList(document.getElementById('searchInput').value);

  renderDetail();
}

          <div class="chart-foot">
            <span>Displaying 12 months history · Horizon: <strong id="horizLbl">${horizLabel}</strong></span>
            <span>ML.Net · SSA · Only this metric's historical data is used</span>
          </div>
        </div>
        <div class="insight-row" id="insightRow"></div>
      </div>
    </div>
  </div>`;

  buildAdjRows();
  renderChart();
}

// ─── Helpers ──────────────────────────────────────────────────────────────
function horizonBtnsHTML(agg, activeH) {
  if (agg === 'quarterly') {
    return [1,2,3,4].map(n=>`<button class="tgl-btn${n===activeH?' active':''}" onclick="setHorizon(${n},this)">${n}Q</button>`).join('');
  }
  return [3,6,12].map(n=>`<button class="tgl-btn${n===activeH?' active':''}" onclick="setHorizon(${n},this)">${n}M</button>`).join('');
}

function setAgg(agg, el) {
  currentFc.agg = agg;
  currentFc.horizon = agg==='quarterly'?4:12;
  adjValues = Array(currentFc.horizon).fill(0);
  const isQ = agg==='quarterly';
  document.querySelectorAll('#aggRow .tgl-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('horizRow').innerHTML = horizonBtnsHTML(agg, currentFc.horizon);
  document.getElementById('horizNote').innerHTML = `Max: <strong>${isQ?'4 quarters':'12 months'}</strong>. 12 months of history displayed.`;
  document.getElementById('dataBanner').innerHTML = `<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg><span>36 months available — forecast ready (min. ${isQ?33:27} required)</span>`;
  buildAdjRows(); renderChart();
}

function setHorizon(n, el) {
  currentFc.horizon = n;
  adjValues = Array(n).fill(0);
  document.querySelectorAll('#horizRow .tgl-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  buildAdjRows(); renderChart();
}

function toggleChip(el) {
  const row = el.parentElement;
  if (el.textContent.trim()==='All') { row.querySelectorAll('.chip').forEach(c=>c.classList.remove('active')); el.classList.add('active'); updateAndRender(); return; }
  row.querySelector('.chip').classList.remove('active');
  el.classList.toggle('active');
  if([...row.querySelectorAll('.chip')].filter(c=>c.classList.contains('active')).length===0) row.querySelector('.chip').classList.add('active');
  updateAndRender();
}

function updateAndRender() { renderChart(); }

function buildAdjRows() {
  const f   = currentFc;
  const isQ = f.agg==='quarterly';
  const labels = (isQ ? FC_Q : FC_M).slice(0, f.horizon);
  const container = document.getElementById('adjRows');
  if (!container) return;
  container.innerHTML = labels.map((lbl,i)=>`
    <div class="adj-row">
      <span class="adj-lbl">${lbl}</span>
      <div class="adj-wrap">
        <input type="number" class="adj-inp" id="adj_${i}" value="${adjValues[i]||0}" step="1" oninput="updDot(${i},this.value)">
        <span class="adj-pm">±</span>
      </div>
      <div class="adj-dot${adjValues[i]!==0?' on':''}" id="adjd_${i}"></div>
    </div>`).join('');
}

function updDot(i,v){const d=document.getElementById('adjd_'+i);if(d)d.className='adj-dot'+(parseFloat(v)!==0?' on':'');}
function applyAdj(){for(let i=0;i<currentFc.horizon;i++){const el=document.getElementById('adj_'+i);if(el){adjValues[i]=parseFloat(el.value)||0;updDot(i,adjValues[i]);}}renderChart();}
function clearAdj(){adjValues=Array(currentFc.horizon).fill(0);buildAdjRows();renderChart();}

// ─── Data gen ─────────────────────────────────────────────────────────────
function genHist(base,trend,seas){let v=base-trend*seas.length;return seas.map(s=>{v+=trend+s*(Math.abs(trend)>1?1:0.1);return Math.round(v*10)/10;});}
function genFc(hist,trend,n,seas){let v=hist[hist.length-1];return Array.from({length:n},(_,i)=>{v+=trend+seas[i%seas.length]*(Math.abs(trend)>1?0.6:0.08);return Math.round(v*10)/10;});}

// ─── Render chart ──────────────────────────────────────────────────────────
function renderChart(){
  const f   = currentFc;
  const cfg = METRICS_CFG[f.metric] || METRICS_CFG.headcount;
  const isQ = f.agg==='quarterly';
  const ci  = parseInt((document.getElementById('ciSlider')||{value:'95'}).value);
  const dept= (document.getElementById('deptSel')||{value:f.dept}).value;
  const metricKey = (document.getElementById('metricSel')||{value:f.metric}).value;
  const mc  = METRICS_CFG[metricKey] || cfg;

  const hSeas = isQ ? SHQ : SH;
  const fSeas = isQ ? SFQ : SF;
  const histLabels = isQ ? HIST_Q : HIST_M;
  const fcLabelsAll= isQ ? FC_Q : FC_M;
  const trend = isQ ? mc.trend*3 : mc.trend;
  const actualsN = isQ ? 1 : 2;

  const hist = genHist(mc.base, trend, hSeas);
  const fc   = genFc(hist, trend, f.horizon, fSeas);
  const adj  = fc.map((v,i)=>Math.round((v+(adjValues[i]||0))*10)/10);
  const ciW  = mc.base*(0.033*(ci/95));
  const ciUp = fc.map(v=>Math.round((v+ciW)*10)/10);
  const ciDn = fc.map(v=>Math.round((v-ciW)*10)/10);
  const fcLabels = fcLabelsAll.slice(0,f.horizon);
  const labels = [...histLabels,...fcLabels];
  const nH = histLabels.length;

  const actualsSeries = [...hist,...fc.slice(0,actualsN),...Array(Math.max(0,f.horizon-actualsN)).fill(null)];
  const fcSeries  = [...Array(nH-1).fill(null),hist[nH-1],...fc];
  const adjSeries = [...Array(nH-1).fill(null),hist[nH-1],...adj];
  const ciUpS = [...Array(nH).fill(null),...ciUp];
  const ciDnS = [...Array(nH).fill(null),...ciDn];

  const cur  = hist[nH-1];
  const fEnd = fc[f.horizon-1];
  const aEnd = adj[f.horizon-1];
  const fcPct=((fEnd-cur)/cur*100).toFixed(1);
  const adjPct=((aEnd-fEnd)/Math.abs(fEnd)*100).toFixed(1);
  const totalAdj=Math.round(adjValues.reduce((a,b)=>a+b,0));
  const hLabel = isQ?f.horizon+'Q':f.horizon+'M';

  const k1=document.getElementById('k1');if(k1){k1.textContent=cur.toLocaleString();document.getElementById('k1d').textContent='as of '+histLabels[nH-1];}
  const k2=document.getElementById('k2');if(k2){k2.textContent=fEnd.toLocaleString();const el=document.getElementById('k2d');el.textContent=(fEnd>=cur?'↑ +':'↓ ')+fcPct+'% vs current';el.className='kpi-d '+(fEnd>=cur?'up':'dn');}
  const k3=document.getElementById('k3');if(k3){k3.textContent=aEnd.toLocaleString();const el=document.getElementById('k3d');el.textContent=(aEnd>=fEnd?'↑ +':'↓ ')+Math.abs(adjPct)+'% vs forecast';el.className='kpi-d '+(aEnd>=fEnd?'up':'dn');}
  const k4=document.getElementById('k4');if(k4)k4.textContent=mc.accuracy;

  const ttl=document.getElementById('chartTtl');if(ttl)ttl.textContent=mc.label+' — '+dept;
  const sub=document.getElementById('chartSub2');if(sub)sub.textContent=(isQ?'4 quarters':'12 months')+' history displayed · SSA seasonal decomposition · '+hLabel+' forecast';
  const cib=document.getElementById('ciBadge');if(cib)cib.textContent=ci+'% CI';
  const hl=document.getElementById('horizLbl');if(hl)hl.textContent=hLabel;

  const ir=document.getElementById('insightRow');
  if(ir)ir.innerHTML=mc.insights.map((ins,i)=>`<div class="ins-card"><div class="ins-val">${i===3?(totalAdj>=0?'+':'')+totalAdj:ins.v}</div><div class="ins-txt">${ins.t}</div></div>`).join('');

  if(chartInst){chartInst.destroy();chartInst=null;}
  const canvas=document.getElementById('fcChart');
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  chartInst=new Chart(ctx,{
    type:'line',
    data:{
      labels,
      datasets:[
        {label:'CI upper',data:ciUpS,fill:'+1',backgroundColor:'rgba(36,88,160,0.09)',borderColor:'transparent',pointRadius:0,tension:0.35},
        {label:'CI lower',data:ciDnS,fill:false,borderColor:'transparent',pointRadius:0,tension:0.35},
        {label:'Actuals',data:actualsSeries,borderColor:'#1a3a5c',backgroundColor:'transparent',borderWidth:2.5,pointRadius:4,pointBackgroundColor:'#1a3a5c',pointBorderColor:'#fff',pointBorderWidth:1.5,tension:0.35},
        {label:'Forecast',data:fcSeries,borderColor:'#2458a0',backgroundColor:'transparent',borderWidth:2,borderDash:[6,4],pointRadius:3,pointBackgroundColor:'#2458a0',tension:0.35},
        {label:'My Adjustments',data:adjSeries,borderColor:'#0ea472',backgroundColor:'transparent',borderWidth:2,borderDash:[3,3],pointRadius:3,pointBackgroundColor:'#0ea472',tension:0.35}
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{
        legend:{display:false},
        tooltip:{
          backgroundColor:'#fff',borderColor:'rgba(26,58,92,0.15)',borderWidth:1,
          titleColor:'#0f1f35',bodyColor:'#4a6080',padding:10,
          callbacks:{label:ctx=>{if(['CI upper','CI lower'].includes(ctx.dataset.label))return null;return ' '+ctx.dataset.label+': '+(ctx.parsed.y!==null?ctx.parsed.y.toLocaleString():'—');}}
        }
      },
      scales:{
        x:{grid:{color:'rgba(26,58,92,0.05)'},ticks:{font:{size:10.5,family:"'DM Mono',monospace"},color:'#8099b8',maxRotation:35,autoSkip:false}},
        y:{grid:{color:'rgba(26,58,92,0.05)'},ticks:{font:{size:10.5,family:"'DM Mono',monospace"},color:'#8099b8',callback:v=>v.toLocaleString()}}
      }
    }
  });
}

// ─── New forecast wizard ──────────────────────────────────────────────────
function showNewWizard() {
  activeId = null;
  renderList();
  document.getElementById('topbarCrumb').textContent = 'New forecast';
  document.getElementById('detailPanel').innerHTML = `
  <div class="wizard">
    <div class="wizard-card">
      <div class="wizard-title">Create a new forecast</div>
      <div class="wizard-sub">Configure your forecast below. illumin8HR uses ML.Net SSA to predict future values based on historical data for the selected metric only.</div>
      <div class="wizard-field">
        <label>Forecast name</label>
        <input type="text" placeholder="e.g. Headcount 12M — All Departments" id="wName">
      </div>
      <div class="wizard-field">
        <label>Metric</label>
        <select id="wMetric">
          <option value="headcount">Headcount</option>
          <option value="attrition">Attrition rate (%)</option>
          <option value="hires">New hires</option>
          <option value="tenure">Avg tenure (months)</option>
          <option value="engagement">Engagement score</option>
        </select>
      </div>
      <div class="wizard-field">
        <label>Generated from</label>
        <select id="wSource">
          <option>Report Designer</option>
          <option>Insight</option>
          <option>My Metrics</option>
          <option>Organisation Metrics</option>
          <option>Dashboard Report</option>
        </select>
      </div>
      <div class="wizard-field">
        <label>Aggregation</label>
        <div class="toggle-row">
          <button class="tgl-btn active" id="wAggM" onclick="document.getElementById('wAggM').classList.add('active');document.getElementById('wAggQ').classList.remove('active');document.getElementById('wHorizonNote').textContent='Max 12 months';">Monthly</button>
          <button class="tgl-btn" id="wAggQ" onclick="document.getElementById('wAggQ').classList.add('active');document.getElementById('wAggM').classList.remove('active');document.getElementById('wHorizonNote').textContent='Max 4 quarters';">Quarterly</button>
        </div>
      </div>
      <div class="wizard-field">
        <label>Forecast horizon</label>
        <div class="toggle-row">
          <button class="tgl-btn" onclick="selWH(3,this,false)">3M</button>
          <button class="tgl-btn" onclick="selWH(6,this,false)">6M</button>
          <button class="tgl-btn active" onclick="selWH(12,this,false)">12M</button>
        </div>
        <div class="wizard-note" id="wHorizonNote">Max 12 months · Only 12 months of history will be displayed on the chart</div>
      </div>
      <div class="wizard-field">
        <label>Department</label>
        <select>
          <option>All departments</option><option>Engineering</option><option>Sales</option><option>Operations</option><option>Finance</option><option>HR &amp; People</option>
        </select>
      </div>
      <div class="wizard-actions">
        <button class="btn btn-ghost" onclick="cancelWizard()">Cancel</button>
        <button class="btn btn-primary" onclick="createForecast()">
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="M12 4v16m-8-8h16"/></svg>
          Generate Forecast
        </button>
      </div>
    </div>
  </div>`;
}

function selWH(n,el,isQ){document.querySelectorAll('.wizard .toggle-row:last-of-type .tgl-btn').forEach(b=>b.classList.remove('active'));el.classList.add('active');}

function cancelWizard(){
  document.getElementById('detailPanel').innerHTML='<div class="empty-state" id="emptyState"><div class="empty-icon"><svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" color="var(--brand-mid)"><path d="M2.25 18L9 11.25l4.306 4.306a11.95 11.95 0 015.814-5.518l2.74-1.22m0 0l-5.94-2.281m5.94 2.28l-2.28 5.941"/></svg></div><div class="empty-title">Select a forecast</div><div class="empty-sub">Choose a forecast from the list to view its chart and details, or create a new one using the button above.</div><button class="btn btn-primary" onclick="showNewWizard()"><svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="M12 4v16m-8-8h16"/></svg>New Forecast</button></div>';
  document.getElementById('topbarCrumb').textContent='All forecasts';
}

function createForecast(){
  const name = document.getElementById('wName').value.trim() || 'New Forecast';
  const metric = document.getElementById('wMetric').value;
  const isQ = document.getElementById('wAggQ').classList.contains('active');
  const newFc = {id:Date.now(),name,metric,dept:'All departments',agg:isQ?'quarterly':'monthly',horizon:isQ?4:12,ci:95,source:document.getElementById('wSource').value,owner:'me',shared:false,updatedDays:0,color:'#2458a0',dotColor:'#2458a0'};
  FORECASTS.unshift(newFc);
  selectFc(newFc.id);
}

// ─── Modals ───────────────────────────────────────────────────────────────
function openMod(type, fcName) {
  const cfgs = {
    save:    {t:'Save forecast',s:'Save changes to "'+fcName+'" for future reference.',b:`<input class="modal-input" type="text" value="${fcName}">`,f:`<button class="btn btn-ghost btn-sm" onclick="closeMod()">Cancel</button><button class="btn btn-primary btn-sm">Save</button>`},
    discuss: {t:'Add a discussion note',s:'Add a comment about "'+fcName+'". Visible to all with access.',b:`<textarea placeholder="Add your observations…"></textarea>`,f:`<button class="btn btn-ghost btn-sm" onclick="closeMod()">Cancel</button><button class="btn btn-primary btn-sm">Post note</button>`},
    discard: {t:'Discard changes?',s:'Unsaved changes to "'+fcName+'" will be lost.',b:'',f:`<button class="btn btn-ghost btn-sm" onclick="closeMod()">Keep editing</button><button class="btn btn-danger btn-sm">Discard</button>`},
    delete:  {t:'Delete forecast?',s:'"'+fcName+'" and all its adjustments and notes will be permanently removed.',b:'',f:`<button class="btn btn-ghost btn-sm" onclick="closeMod()">Cancel</button><button class="btn btn-danger btn-sm">Delete permanently</button>`},
    ssa:     {t:'How forecasting works',s:'illumin8HR uses ML.Net with Singular Spectrum Analysis (SSA) to generate forecast predictions.',
      b:`<div style="font-size:12px;color:var(--text2);line-height:1.7;">
        <p style="margin-bottom:10px;"><strong style="color:var(--text);">What is SSA?</strong> A model-free technique that decomposes time series into trend, seasonal components and noise — no assumptions about parametric form.</p>
        <p style="margin-bottom:10px;"><strong style="color:var(--text);">What data is used?</strong> Only the historical values of the selected metric. No other metrics or correlations.</p>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px;">
          <div style="background:var(--surface);border-radius:var(--r-md);padding:10px 12px;border:0.5px solid var(--border);">
            <div style="font-size:10px;color:var(--text3);margin-bottom:2px;">Monthly</div>
            <div style="font-size:20px;font-weight:600;color:var(--brand-mid);font-family:var(--mono);">27 months</div>
            <div style="font-size:10px;color:var(--text3);">minimum data required</div>
          </div>
          <div style="background:var(--surface);border-radius:var(--r-md);padding:10px 12px;border:0.5px solid var(--border);">
            <div style="font-size:10px;color:var(--text3);margin-bottom:2px;">Quarterly</div>
            <div style="font-size:20px;font-weight:600;color:var(--brand-mid);font-family:var(--mono);">33 months</div>
            <div style="font-size:10px;color:var(--text3);">minimum data required</div>
          </div>
        </div>
      </div>`,
      f:`<button class="btn btn-primary btn-sm" onclick="closeMod()">Got it</button>`},
  };
  const c=cfgs[type]||cfgs.save;
  document.getElementById('modTitle').textContent=c.t;
  document.getElementById('modSub').textContent=c.s;
  document.getElementById('modBody').innerHTML=c.b;
  document.getElementById('modFoot').innerHTML=c.f;
  document.getElementById('modalBg').classList.add('open');
}
function closeMod(e){if(!e||e.target===document.getElementById('modalBg'))document.getElementById('modalBg').classList.remove('open');}

// ─── Init ──────────────────────────────────────────────────────────────────
renderList();
</script>
